<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <title>阅读记录</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
</head>

<body>

    <!-- 左侧导航栏 -->
    <div class="sidebar">

        <h2>StarRead</h2>

        <ul>

            <li>
                <a href="/">
                    🏠 首页
                </a>
            </li>

            <li>
                <a href="/generate_story">
                    📖 故事搜索
                </a>
            </li>

            <li>
                <a href="/story_library">
                    📚 故事书库
                </a>
            </li>

            <li>
                <a href="/favorite_list">
                    ❤️ 我的收藏
                </a>
            </li>

            <li>
                <a href="/reading_record">
                    📝 阅读记录
                </a>
            </li>

            <li>
                <a href="/parent_center">
                    👨‍👩‍👧 家长中心
                </a>
            </li>

        </ul>

    </div>

<div class="page">
    <h1>📝 阅读记录</h1>

    <div class="card">
        <p>累计阅读：<strong>{{ total_count }}</strong> 篇</p>
        <p>累计阅读时间：<strong>{{ total_minutes }}</strong> 分钟</p>
    </div>

    {% for record in records %}
    <div class="card">
        <h3>{{ record[0] }}</h3>
        <p>阅读时间：{{ record[1] }}</p>
        <p>阅读时长：{{ record[2] }} 分钟</p>
    </div>
    {% endfor %}
</div>
</body>
</html>
