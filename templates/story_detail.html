<!DOCTYPE html>
<html>
<head>
    <title>Story Detail</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
</head>
<body>

<div class="container">

    <h1>{{ story.title }}</h1>

    <p>{{ story.content }}</p>

    <a href="{{ url_for('add_favorite', story_id=story.id) }}">
        Add to Favorites
    </a>

</div>

</body>
</html>
