<!DOCTYPE html>
<html lang="zh-CN">

<head>
    <meta charset="UTF-8">
    <title>故事书库</title>

    <link rel="stylesheet"
          href="{{ url_for('static', filename='css/style.css') }}">
</head>

<body>

<div class="content">

    <h1>故事书库</h1>

    {% for story in stories %}

    <a href="/story/{{ story[0] }}" style="text-decoration:none; color:black;">
        <div class="card">
            <h3>{{ story[1] }}</h3>
            <p>主题：{{ story[2] }}</p>
            <p>年龄段：{{ story[3] }}</p>
            <p>阅读次数：{{ story[4] }}</p>
        </div>
    </a>

    {% endfor %}

</div>

</body>
</html>
